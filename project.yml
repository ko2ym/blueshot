name: Blueshot
options:
  bundleIdPrefix: com.blueshot
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  Blueshot:
    type: application
    platform: macOS
    sources:
      - path: Blueshot
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blueshot.app
        PRODUCT_NAME: Blueshot
        INFOPLIST_FILE: Blueshot/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Blueshot/Resources/Blueshot.entitlements
        ENABLE_APP_SANDBOX: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Blueshot/Resources/Info.plist
      properties:
        CFBundleName: Blueshot
        CFBundleDisplayName: Blueshot
        CFBundleIdentifier: com.blueshot.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSScreenCaptureUsageDescription: "Blueshot needs screen recording permission to capture screenshots."
        NSAppleEventsUsageDescription: "Blueshot uses Apple Events to interact with other applications."

  BlueshotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BlueshotTests
    dependencies:
      - target: Blueshot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blueshot.tests
